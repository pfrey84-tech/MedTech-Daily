name: Build MedTech Daily

on:
  schedule:
    # Läuft täglich um 04:00 UTC (~05:00 Winter / 06:00 Sommer Berlin)
    - cron: "0 4 * * *"
  workflow_dispatch:        # erlaubt manuelles Starten per Knopf
  push:
    branches: [ main ]      # baut sofort bei jeder Änderung

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeit installieren
        run: pip install feedparser

      - name: Seite bauen
        run: python build.py

      - name: Seite als Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
